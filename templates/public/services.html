{% extends "base.html" %}
{% block title %}Services | Capital Group{% endblock %}
{% block content %}
<section class="page-header"><div class="container"><h1>Services</h1><p>Construction expertise from early planning to handover.</p></div></section>
<section class="py-5"><div class="container"><div class="row g-4">
{% for service in services %}

{% endfor %}
</div></div></section>
{% endblock %}
